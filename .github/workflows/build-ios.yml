name: ProjectTerra.IOS build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install Mono
      run: |
        brew install mono
        mono --version

    - name: Install MSBuild
      run: |
        brew install --cask visual-studio
        msbuild -version

    - name: Install NuGet
      run: |
        brew install nuget
        nuget update -self
        nuget --version

    - name: Restore dependencies
      run: |
        msbuild /restore ProjectTerra.iOS/ProjectTerra.iOS.csproj /p:Configuration=Release /p:Platform=iPhoneSimulator

    - name: Build iOS Project
      run: |
        msbuild ProjectTerra.iOS/ProjectTerra.iOS.csproj \
          /t:Build \
          /p:Configuration=Release \
          /p:Platform=iPhoneSimulator \
          /p:OutputPath=./output

    - name: Archive and Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath ./output/ProjectTerra.xcarchive \
          -exportPath ./output \
          -exportOptionsPlist ExportOptions.plist

    - name: Upload IPA as artifact
      uses: actions/upload-artifact@v3
      with:
        name: ProjectTerra.ipa
        path: ./output/*.ipa

