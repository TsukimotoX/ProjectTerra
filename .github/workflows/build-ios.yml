name: ProjectTerra.IOS build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Update Mono
      run: |
        brew update
        brew upgrade mono

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 6.0

    - name: Update NuGet
      run: |
        nuget update -self

    - name: Restore dependencies and build
      run: |
        msbuild /restore ProjectTerra.iOS/ProjectTerra.iOS.csproj /p:Configuration=Release /p:Platform=iPhoneSimulator

    - name: Archive and Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath ./output/ProjectTerra.xcarchive \
          -exportPath ./output \
          -exportOptionsPlist ExportOptions.plist

    - name: Upload IPA as artifact
      uses: actions/upload-artifact@v3
      with:
        name: ProjectTerra.ipa
        path: ./output/*.ipa

