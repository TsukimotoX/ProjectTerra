name: Build iOS App with Xamarin and .NET 9

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install Mono
      run: |
        brew update
        brew install mono
        mono --version

    - name: Install .NET 9 SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 9.0.100

    - name: Install NuGet
      run: |
        brew install nuget
        nuget update -self

    - name: Restore NuGet dependencies
      run: |
        dotnet restore ProjectTerra.iOS/ProjectTerra.iOS.csproj

    - name: Build iOS Project
      run: |
        dotnet build ProjectTerra.iOS/ProjectTerra.iOS.csproj \
          -c Release \
          -o ./output

    - name: Archive and Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath ./output/ProjectTerra.xcarchive \
          -exportPath ./output \
          -exportOptionsPlist ExportOptions.plist

    - name: Upload IPA as artifact
      uses: actions/upload-artifact@v3
      with:
        name: ProjectTerra.ipa
        path: ./output/*.ipa

