name: Build iOS App without Code Signing

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install .NET 9 SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 9.0.100

    - name: Install iOS Workload
      run: |
        dotnet workload install ios
        dotnet workload restore ProjectTerra.iOS/ProjectTerra.iOS.csproj

    - name: Create Fake Signing Identity
      run: |
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        touch ~/Library/MobileDevice/Provisioning\ Profiles/Fake.mobileprovision

    - name: Publish iOS App without Signing
      run: |
        dotnet publish ProjectTerra.iOS/ProjectTerra.iOS.csproj \
          -c Release \
          -o ./output \
          /p:RuntimeIdentifier=ios-arm64 \
          /p:OutputType=Exe \
          /p:EnableCodeSigning=false \
          /p:CodesignProvision=~/Library/MobileDevice/Provisioning\ Profiles/Fake.mobileprovision

    - name: Upload IPA as artifact
      uses: actions/upload-artifact@v3
      with:
        name: ProjectTerra.ipa
        path: ./output/*.ipa

