name: Build iOS App with Xamarin and .NET 9

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install .NET 9 SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 9.0.100

    - name: Install iOS Workload
      run: |
        dotnet workload install ios
        dotnet workload restore ProjectTerra.iOS/ProjectTerra.iOS.csproj

    - name: Restore NuGet dependencies
      run: |
        dotnet restore ProjectTerra.iOS/ProjectTerra.iOS.csproj

    - name: Publish iOS App
      run: |
        dotnet publish ProjectTerra.iOS/ProjectTerra.iOS.csproj \
          -c Release \
          -o ./output \
          /p:RuntimeIdentifier=ios-arm64 \
          /p:OutputType=Exe

    - name: Upload IPA as artifact
      uses: actions/upload-artifact@v3
      with:
        name: ProjectTerra.ipa
        path: ./output/*.ipa


