name: Build iOS App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Restore .NET Workloads
        run: dotnet workload restore

      - name: Install Dependencies
        run: sudo xcode-select --switch /Applications/Xcode_16.2.app/Contents/Developer

      - name: Build and Publish iOS App
        run: |
          dotnet publish ProjectTerra.iOS/ProjectTerra.iOS.csproj \
          -c Release \
          -f:net9.0-ios \
          /p:RuntimeIdentifier=ios-arm64 \
          /p:CodesignKey=null \
          /p:CodesignProvision=null \
          /p:CodesignEntitlements=null \
          /p:EnableCodeSigning=false



      - name: Archive App to IPA
        run: |
          xcodebuild -exportArchive \
          -archivePath ./output/ProjectTerra.xcarchive \
          -exportPath ./output/ProjectTerra.ipa \
          -exportOptionsPlist ./ExportOptions.plist \
          CODE_SIGNING_ALLOWED=NO

      - name: Upload IPA
        uses: actions/upload-artifact@v3
        with:
          name: ProjectTerra.ipa
          path: ./output/ProjectTerra.ipa
