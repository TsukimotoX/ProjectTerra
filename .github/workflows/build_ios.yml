name: Project Terra iOS build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-15

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install .NET 9 SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 9.0.100

    - name: Install iOS Workload
      run: |
        dotnet workload install ios
        dotnet workload restore ProjectTerra.iOS/ProjectTerra.iOS.csproj
    
    - name: Select Xcode 16.2
      run: sudo xcode-select --switch /Applications/Xcode_16.2.app/Contents/Developer

    - name: Build iOS App
      run: |
        dotnet publish ProjectTerra.iOS/ProjectTerra.iOS.csproj \
          -c Release \
          -o ./output \
          /p:RuntimeIdentifier=ios-arm64 \
          /p:EnableCodeSigning=false

    - name: Create Xcode Archive
      run: |
        xcodebuild archive \
          -project ProjectTerra.iOS/ProjectTerra.iOS.csproj \
          -scheme ProjectTerra.iOS \
          -archivePath ./output/ProjectTerra.xcarchive \
          -sdk iphoneos

    - name: Archive and Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath ./output/ProjectTerra.xcarchive \
          -exportPath ./output \
          -exportOptionsPlist ExportOptions.plist

    - name: Upload IPA as artifact
      uses: actions/upload-artifact@v3
      with:
        name: ProjectTerra.ipa
        path: ./output/*.ipa
